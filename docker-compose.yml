services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kasirku
      POSTGRES_PASSWORD: kasirku
      POSTGRES_DB: kasirku
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kasirku"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://kasirku:kasirku@db:5432/kasirku?sslmode=disable
      JWT_SECRET: change-this-to-a-long-random-secret-at-least-32-chars
      JWT_TTL_DAYS: "30"
      ADMIN_EMAIL: admin@example.com
      BACKUP_MAX_SIZE_MB: "50"
      BACKUP_RETENTION_COUNT: "3"
      SUBSCRIPTION_STALENESS_HOURS: "24"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
