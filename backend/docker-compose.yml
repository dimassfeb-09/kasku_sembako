services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kasirku
      POSTGRES_PASSWORD: kasirku
      POSTGRES_DB: kasirku
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kasirku"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
